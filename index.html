<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

   <div class="app">

  <div id="homeScreen">
  <div class="content">
  <div class="home-card">
    <h2>Welcome to Bolo</h2>
    <p>Reminders that feel like family</p>
    <button class="next-btn" id="getStartedBtn">Get started</button>
  </div>
</div>


  <div class="screen" id="onboardingScreen" style="display: none;">
    <div class="header">
      <h1>Bolo</h1>
      <p>Let's get you set up</p>
    </div>
    <div class="content">
      <p class="section-label">What's your name?</p>
      <input type="text" id="nameInput" placeholder="Enter your name" />
      <button class="next-btn" id="nextBtn">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
</div>
  </body>
</html>
