<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">

      <div id="homeScreen">
        <div class="content">
          <div class="home-card">
            <h2>Welcome to Bolo</h2>
            <p>Reminders that feel like family</p>
            <button class="next-btn" id="getStartedBtn">Get started</button>
          </div>
        </div>
      </div>

      <div class="screen" id="whoScreen" style="display: none;">
        <div class="content">
          <p class="section-label">Who is this for?</p>
          <div class="who-btns">
            <button class="mode-btn" id="myselfBtn">
              <span class="mode-title">Myself</span>
              <span class="mode-sub">I'll manage my own medicines</span>
            </button>
            <button class="mode-btn" id="someoneBtn">
              <span class="mode-title">Someone I care for</span>
              <span class="mode-sub">I'm setting this up for a family member</span>
            </button>
          </div>
        </div>
      </div>

      <script src="script.js"></script>
    </div>
  </body>
</html>
