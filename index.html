<!DOCTYPE html>
<html lang="en"></html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
<div class="header">
<h1>Bolo</h1>
<p>Reminders that feel like family</p>
</div>
<div class="content">
  <p class="section-label">Choose your mode</p>

  <div class="buttons-row">

    <button class="mode-btn" id="patientBtn">
      <span class="mode-title">Patient mode</span>
      <span class="mode-sub">Hear your reminders</span>
    </button>

    <button class="mode-btn" id="caregiverBtn">
      <span class="mode-title">Caregiver setup</span>
      <span class="mode-sub">Add patients and medications</span>
    </button>

  </div>

</div>
